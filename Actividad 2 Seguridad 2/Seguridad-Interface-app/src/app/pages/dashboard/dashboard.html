<div class="layout" *ngIf="user as u">

  <!-- HEADER -->
  <header class="header">
    <h1>Actividad 2</h1>

    <div class="header-right">
      <span>Hola, {{ u.name }}</span>

      <!-- Botón solo ADMIN -->
      <button *ngIf="u.role === 'admin'" (click)="goToCreateUser()">
        + Crear Usuario
      </button>

      <button (click)="logout()">Cerrar sesión</button>
    </div>
  </header>

  <!-- CONTENIDO -->
  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <ul>

        <li (click)="view = 'home'">Inicio</li>

        <!-- ADMIN -->
        <li *ngIf="u.role === 'admin'" (click)="view = 'users'">
          Gestión de usuarios
        </li>

        <!-- SELLER -->
        <li *ngIf="u.role === 'seller'" (click)="view = 'users'">
          Ver usuarios
        </li>

      </ul>
    </aside>

    <!-- MAIN -->
    <main class="content">

      <!-- VISTA INICIO -->
      <section *ngIf="view === 'home'" class="card">
        <h2>Bienvenido, {{ u.name }}</h2>

        <p *ngIf="u.role === 'admin'">
          Tienes acceso completo al sistema.
        </p>

        <p *ngIf="u.role === 'seller'">
          Puedes gestionar y visualizar usuarios.
        </p>

        <p *ngIf="u.role === 'user'">
          Bienvenido a tu espacio personal.
        </p>
      </section>

      <!-- VISTA USUARIOS -->
      <section *ngIf="view === 'users'" class="card">
        <h3>Listado de usuarios</h3>

        <!-- Aquí luego conectas con Laravel -->
        <p>Aquí irá la tabla de usuarios...</p>
      </section>

    </main>
  </div>
</div>
