<div class="login-wrapper">
  <div class="login-card">
    <h2>Bienvenido</h2>
    <p>Inicia sesión para continuar</p>

    <form (submit)="login()">
      <div class="input-group">
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="Correo electrónico" 
          required>
      </div>

      <div class="input-group">
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="Contraseña" 
          required>
      </div>

      <button type="submit">Ingresar</button>
    </form>
  </div>
</div>
